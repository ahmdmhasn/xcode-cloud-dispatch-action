name: 'Xcode Cloud Dispatcher'
description: 'Triggers Apple Xcode Cloud builds for Flutter and Native iOS projects.'
author: 'Your Name'

inputs:
  apple_key_id:
    description: 'App Store Connect Key ID'
    required: true
  apple_issuer_id:
    description: 'App Store Connect Issuer ID'
    required: true
  apple_private_key:
    description: 'Content of the .p8 private key'
    required: true
  workflow_id:
    description: 'The Xcode Cloud Workflow ID'
    required: true
  project_path:
    description: 'Optional: Path to .xcodeproj (e.g. "ios/Runner.xcodeproj").'
    required: false
    default: ''
  info_plist_path:
    description: 'Optional: Path to Info.plist. Use for projects with a hardcoded CFBundleShortVersionString.'
    required: false
    default: ''
  git_ref:
    description: 'Optional: Branch or tag name to build (e.g. "main", "v1.2.0"). Defaults to the workflow default branch in Xcode Cloud.'
    required: false
    default: ''
  team_id:
    description: 'Optional: App Store Connect Team ID for deep-linking'
    required: false
    default: ''
  app_id:
    description: 'Optional: App Store Connect App ID for deep-linking'
    required: false
    default: ''

outputs:
  build_number:
    description: 'The Apple-assigned build number'
    value: ${{ steps.xcode_cloud.outputs.apple_build_number }}
  build_url:
    description: 'The deep-link to the build summary'
    value: ${{ steps.xcode_cloud.outputs.build_url }}
  marketing_version:
    description: 'The auto-detected marketing version'
    value: ${{ steps.meta.outputs.marketing_version }}

runs:
  using: 'composite'
  steps:
    - name: 'Determine Marketing Version'
      id: 'meta'
      shell: bash
      run: |
        # 1. Resolve Project Path
        PATH_TO_PROJECT="${{ inputs.project_path }}"
        if [ -z "$PATH_TO_PROJECT" ]; then
          PATH_TO_PROJECT=$(find . -maxdepth 2 -name "*.xcodeproj" -print -quit)
        fi

        # 2. Extract Version (Flutter -> Info.plist -> project.pbxproj)
        if [ -f "pubspec.yaml" ]; then
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/^version: //' | cut -d'+' -f1 | tr -d '[:space:]')
        elif [ -n "${{ inputs.info_plist_path }}" ]; then
          VERSION=$(python3 -c "import plistlib; d=plistlib.load(open('${{ inputs.info_plist_path }}','rb')); print(d.get('CFBundleShortVersionString',''))" 2>/dev/null)
        elif [ -n "$PATH_TO_PROJECT" ] && [ -f "$PATH_TO_PROJECT/project.pbxproj" ]; then
          VERSION=$(grep 'MARKETING_VERSION' "$PATH_TO_PROJECT/project.pbxproj" \
            | grep -v '^\s*//' | tail -1 | cut -d'=' -f2 | tr -d ';"[:space:]')
        fi

        echo "marketing_version=${VERSION:-}" >> "$GITHUB_OUTPUT"

    - name: 'Generate JWT'
      id: 'jwt'
      shell: bash
      run: |
        pip install PyJWT cryptography --quiet
        TOKEN=$(python3 ${{ github.action_path }}/gen_jwt.py)
        echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      env:
        KEY_ID: ${{ inputs.apple_key_id }}
        ISSUER_ID: ${{ inputs.apple_issuer_id }}
        PRIVATE_KEY: ${{ inputs.apple_private_key }}

    - name: 'API Dispatch'
      id: 'xcode_cloud'
      shell: bash
      run: |
        AUTH="Authorization: Bearer ${{ steps.jwt.outputs.token }}"

        # Resolve git reference ID if a branch/tag was specified
        GIT_REF_RELATIONSHIP=""
        if [ -n "${{ inputs.git_ref }}" ]; then
          REPO_ID=$(curl -s \
            -H "$AUTH" \
            "https://api.appstoreconnect.apple.com/v1/ciWorkflows/${{ inputs.workflow_id }}/repository" \
            | jq -r '.data.id // ""')

          if [ -z "$REPO_ID" ]; then
            echo "::error::Could not resolve repository for workflow ${{ inputs.workflow_id }}"
            exit 1
          fi

          REFS_RESPONSE=$(curl -s \
            -H "$AUTH" \
            "https://api.appstoreconnect.apple.com/v1/scmRepositories/${REPO_ID}/gitReferences")
          echo "Available git references:"
          echo "$REFS_RESPONSE" | jq -r '.data[] | "\(.attributes.kind) \(.attributes.name)"'

          GIT_REF_ID=$(echo "$REFS_RESPONSE" \
            | jq -r --arg name "${{ inputs.git_ref }}" '.data[] | select(.attributes.name == $name) | .id' | head -1)

          if [ -z "$GIT_REF_ID" ]; then
            echo "::error::Could not find branch or tag '${{ inputs.git_ref }}' in repository"
            exit 1
          fi

          GIT_REF_RELATIONSHIP=', "sourceBranchOrTag": { "data": { "type": "scmGitReferences", "id": "'"$GIT_REF_ID"'" } }'
        fi

        echo "::group::Xcode Cloud API Request"
        RESPONSE=$(curl -s -i -X POST "https://api.appstoreconnect.apple.com/v1/ciBuildRuns" \
          -H "$AUTH" \
          -H "Content-Type: application/json" \
          -d "{
            \"data\": {
              \"type\": \"ciBuildRuns\",
              \"relationships\": {
                \"workflow\": { \"data\": { \"type\": \"ciWorkflows\", \"id\": \"${{ inputs.workflow_id }}\" } }${GIT_REF_RELATIONSHIP}
              }
            }
          }")
        echo "::endgroup::"

        # Separate Header and Body for debugging
        HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP | tail -1 | awk '{print $2}')
        BODY=$(echo "$RESPONSE" | sed '1,/^\r$/d')

        echo "HTTP Status: $HTTP_STATUS"
        
        # Parse values
        APPLE_BUILD=$(echo "$BODY" | jq -r '.data.attributes.number // "null"')
        BUILD_ID=$(echo "$BODY" | jq -r '.data.id // "null"')

        if [[ "$APPLE_BUILD" == "null" || "$HTTP_STATUS" -ne 201 ]]; then
          echo "::error::Xcode Cloud Dispatch Failed!"
          echo "Full API Response:"
          echo "$BODY" | jq .
          exit 1
        fi

        echo "Successfully triggered Build #$APPLE_BUILD"
        echo "apple_build_number=$APPLE_BUILD" >> "$GITHUB_OUTPUT"

        # URL Logic
        if [[ -n "${{ inputs.team_id }}" && -n "${{ inputs.app_id }}" ]]; then
          URL="https://appstoreconnect.apple.com/teams/${{ inputs.team_id }}/apps/${{ inputs.app_id }}/ci/builds/$BUILD_ID/summary"
          echo "build_url=$URL" >> "$GITHUB_OUTPUT"
        else
          echo "build_url=https://appstoreconnect.apple.com/apps" >> "$GITHUB_OUTPUT"
        fi